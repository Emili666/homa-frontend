<div class="relative w-full">
  <input class="w-full border rounded-md px-3 py-2 pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500"
    [attr.placeholder]="placeholder" [type]="type === 'password' && showPassword ? 'text' : type"
    [formControl]="control" />
  <button *ngIf="type === 'password'" type="button"
    class="absolute right-3 top-2.5 text-gray-500 hover:text-gray-700 focus:outline-none" (click)="togglePassword()">
    <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
  </button>
  <p class="mt-1 text-sm text-red-600" *ngIf="control?.invalid && control?.touched">
    Campo inválido
  </p>
</div>
