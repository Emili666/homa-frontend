<button
  [attr.type]="type"
  [disabled]="isDisabled"
  (click)="onClick()"
  class="w-full inline-flex items-center justify-center gap-2 rounded-lg font-semibold px-4 py-2 transition-all duration-200"
  [ngClass]="{
    'bg-blue-600 text-white hover:bg-blue-700': color === 'primary' && !isDisabled,
    'bg-blue-400 text-white cursor-not-allowed': color === 'primary' && isDisabled,
    'bg-fuchsia-600 text-white hover:bg-fuchsia-700': color === 'accent' && !isDisabled,
    'bg-fuchsia-400 text-white cursor-not-allowed': color === 'accent' && isDisabled,
    'bg-red-600 text-white hover:bg-red-700': color === 'warn' && !isDisabled,
    'bg-red-400 text-white cursor-not-allowed': color === 'warn' && isDisabled
  }"
>
  <!-- Spinner de carga -->
  <svg *ngIf="loading" class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
  </svg>
  {{ loading ? loadingLabel : label }}
</button>
