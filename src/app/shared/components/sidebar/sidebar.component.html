<div class="h-full flex flex-col bg-slate-900 shadow-xl lg:shadow-none text-white overflow-hidden">
  <!-- Brand -->
  <div class="flex items-center justify-between h-16 px-6 border-b border-slate-700">
    <a routerLink="/" class="flex items-center gap-2 text-xl font-black tracking-tighter text-white">
      <img src="assets/images/logo-homa.png" alt="HOMA Logo" class="h-8 w-auto">
      <span>HOMA <span class="text-slate-400 font-medium text-sm align-middle">ADMIN</span></span>
    </a>
    <button (click)="closeSidebar.emit()" class="lg:hidden p-2 text-slate-400 hover:text-white transition">
      <span class="material-icons">close</span>
    </button>
  </div>
  
  <!-- Content (Nav) -->
  <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto w-full max-w-[280px]">
    <a routerLink="/admin/dashboard" routerLinkActive="bg-primary-600/20 text-primary-400 font-semibold"
       class="flex items-center px-4 py-3 text-slate-300 rounded-lg hover:bg-slate-800 hover:text-white transition-all group w-full truncate">
      <span class="material-icons mr-3 group-hover:scale-110 transition-transform">dashboard</span>
      <span class="truncate">Dashboard</span>
    </a>
    <a routerLink="/admin/usuarios" routerLinkActive="bg-primary-600/20 text-primary-400 font-semibold"
       class="flex items-center px-4 py-3 text-slate-300 rounded-lg hover:bg-slate-800 hover:text-white transition-all group w-full truncate">
      <span class="material-icons mr-3 group-hover:scale-110 transition-transform">people</span>
      <span class="truncate">Usuarios</span>
    </a>
    <a routerLink="/admin/alojamientos" routerLinkActive="bg-primary-600/20 text-primary-400 font-semibold"
       class="flex items-center px-4 py-3 text-slate-300 rounded-lg hover:bg-slate-800 hover:text-white transition-all group w-full truncate">
      <span class="material-icons mr-3 group-hover:scale-110 transition-transform">home_work</span>
      <span class="truncate">Alojamientos</span>
    </a>
  </nav>
  
  <!-- Footer (User Info) -->
  <div class="p-4 border-t border-slate-700 bg-slate-800/30">
    <div class="flex items-center" *ngIf="user$ | async as u">
      <div class="w-10 h-10 rounded-full bg-gradient-to-r from-primary-500 to-secondary-500 flex items-center justify-center text-white font-bold shadow-md shrink-0">
        {{ u.nombre.charAt(0) }}
      </div>
      <div class="ml-3 overflow-hidden flex-1 min-w-0 pr-2">
        <p class="text-sm font-bold text-slate-200 truncate" [title]="u.nombre">{{ u.nombre }}</p>
        <p class="text-xs text-slate-400 truncate" [title]="u.email">{{ u.email }}</p>
      </div>
      <button (click)="logout()" class="p-2 text-slate-400 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition shrink-0" title="Cerrar Sesión">
        <span class="material-icons">logout</span>
      </button>
    </div>
  </div>
</div>
