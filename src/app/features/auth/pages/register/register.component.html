<app-auth-template title="Crear Cuenta" subtitle="Regístrate para comenzar">
  <app-register-form
    [form]="form"
    [loading]="isLoading"
    (submitForm)="onSubmit()"
  ></app-register-form>

  <!-- Widget Cloudflare Turnstile CAPTCHA -->
  <div class="mt-3 flex flex-col items-center gap-1">
    <div id="turnstile-register"></div>
    <!-- Mensaje si intenta enviar sin completar el captcha -->
    <p *ngIf="error === 'Por favor completa la verificación de seguridad.'"
       class="text-xs text-gray-500 text-center">
      🔒 Verifica que no eres un robot para continuar
    </p>
  </div>

  <!-- Mensajes de éxito y error -->
  <div
    *ngIf="successMessage"
    class="mt-3 rounded-md border border-green-200 bg-green-50 px-3 py-2 text-sm text-green-800 flex items-center gap-2"
  >
    <span class="text-green-600">✅</span>
    {{ successMessage }}
  </div>
  <p *ngIf="error && error !== 'Por favor completa la verificación de seguridad.'"
     class="mt-3 text-sm text-red-600 flex items-center gap-1">
    <span>⚠️</span> {{ error }}
  </p>
  <p *ngIf="form.errors?.['passwordMismatch'] && form.get('confirmPassword')?.touched" class="mt-2 text-sm text-red-600">
    Las contraseñas no coinciden
  </p>
  <div class="mt-4 text-center">
    <span class="text-sm text-gray-600">¿Ya tienes una cuenta? </span>
    <a (click)="goToLogin()" class="text-sm text-blue-600 hover:underline cursor-pointer font-semibold">
      Inicia sesión aquí
    </a>
  </div>
</app-auth-template>
